name: Build and Test

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'torrc'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'torrc'
      - '.github/workflows/build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: false
        load: true
        tags: tor-hidden-service:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Test Docker image
      run: |
        docker run --name tor-test -d tor-hidden-service:test
        sleep 15
        docker logs tor-test
        docker logs tor-test | grep -q "Bootstrapped 100%" || exit 1
        docker stop tor-test && docker rm tor-test
    
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: false
        load: true
        tags: tor-hidden-service:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
  publish:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name != 'pull_request'
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract Tor version
      id: tor_version
      run: |
        TOR_VERSION=$(grep -oP 'TOR_VERSION=\K[^"]+' Dockerfile)
        echo "TOR_VERSION=$TOR_VERSION" >> $GITHUB_ENV
        echo "tor_version=$TOR_VERSION" >> $GITHUB_OUTPUT
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository_owner }}/tor-hidden-service
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=tor-${{ env.TOR_VERSION }},enable=${{ env.TOR_VERSION != '' }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        labels: ${{ steps.meta.outputs.labels }}
